<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Dashboard - EventShare</title>

    <link rel="stylesheet" href="../../css/organizer/organizer-dashboard.css">
</head>

<body>


<div class="topbar">

    <div>
        <div class="logo">EventShare</div>
        <p class="welcome-text">Welcome back 👋</p>
    </div>

    <div class="topbar-actions">

        <!-- Profile Icon -->
        <button class="icon-btn" id="profileBtn" title="Profile">
            👤
        </button>

        <button class="logout-btn" id="logoutBtn">
            Logout
        </button>

    </div>

</div>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">

        <h1>
            Your Events,
            <span>Your Memories</span>
        </h1>

        <p>
            Create beautiful shared galleries where guests upload moments instantly through QR codes and links.
        </p>

        <button class="create-btn" id="openCreateBtn">
            + Create Event
        </button>

    </div>
</section>

<!-- EVENTS -->
<div class="section-header">
    <h2>Your Events</h2>
    <p>Manage your shared memories and guest uploads.</p>
</div>

<div class="events-grid" id="eventsContainer"></div>

<!-- CREATE MODAL -->
<div class="modal" id="createModal">

    <div class="modal-content">

        <div class="modal-header">
            <h2>Create Event</h2>
            <button class="close-btn" id="closeCreateBtn">✕</button>
        </div>

        <form id="createEventForm">

            <div class="form-group">
                <label>Event Title</label>
                <input type="text" name="title" placeholder="Wedding Night 2026" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" placeholder="Describe your event..."></textarea>
            </div>

            <div class="form-group">
                <label>Event Date</label>
                <input type="date" name="event_date" required>
            </div>

            <button type="submit" class="submit-btn">
                Create Event
            </button>

        </form>

    </div>

</div>

<div class="modal" id="profileModal">

    <div class="modal-content">

        <div class="modal-header">
            <h2>Your Profile</h2>
            <button class="close-btn" id="closeProfileBtn">✕</button>
        </div>

        <form id="profileForm">

            <input type="hidden" name="id" id="profileId">

            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" id="profileName" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" id="profileEmail" required>
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="password" id="profilePassword" placeholder="Leave blank to keep current">
            </div>

            <button type="submit" class="submit-btn">
                Update Profile
            </button>

            <button type="button" class="submit-btn" id="deleteAccountBtn" style="background-color: #e74c3c; margin-top: 10px;">
                Delete Account
            </button>

        </form>

    </div>

</div>


<!-- EDIT MODAL -->
<div class="modal" id="editModal">

    <div class="modal-content">

        <div class="modal-header">
            <h2>Edit Event</h2>
            <button class="close-btn" id="closeEditBtn">✕</button>
        </div>

        <form id="editEventForm">

            <input type="hidden" id="editEventId">

            <div class="form-group">
                <label>Event Title</label>
                <input type="text" id="editEventTitle" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="editEventDescription"></textarea>
            </div>

            <div class="form-group">
                <label>Event Date: </label>
                <label id="editEventDateName"></label>
            </div>

            <div class="form-group">
                <label>Update Event Date</label>
                <input type="date" id="editEventDate">
            </div>

            <button type="submit" class="submit-btn">
                Update Event
            </button>

        </form>

    </div>

</div>

<script>
const token = localStorage.getItem("token");

document.addEventListener("DOMContentLoaded", () => {
    loadEvents();
});

/* ---------------- EVENTS ---------------- */

async function loadEvents() {

    const res = await fetch("/api/events", {
        headers: {
            "Authorization": `Bearer ${token}`,
            "Accept": "application/json"
        }
    });

    const data = await res.json();
    const events = Array.isArray(data) ? data : (data.data ?? []);

    const container = document.getElementById("eventsContainer");

    if (events.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <h3>No events yet</h3>
                <p>Start creating your first shared memory experience.</p>
            </div>
        `;
        return;
    }

    container.innerHTML = events.map(event => `
        <div class="event-card">

            <div class="event-top">

                <div>
                    <h3>${event.title}</h3>
                    <p class="event-date">📅 ${event.event_date}</p>
                </div>

                <div class="event-badge">Live</div>

            </div>

            <p class="event-description">
                ${event.description ?? 'No description'}
            </p>

            <div class="event-link">
                🔗 /public/events/${event.slug}
            </div>

            <div class="event-actions">

                <button class="action-btn secondary-btn view-uploads-btn"
                        data-slug="${event.slug}">
                    View Uploads
                </button>

                <button class="action-btn delete-btn delete-btn-js"
                        data-id="${event.id}">
                    Delete
                </button>

                <button class="action-btn edit-btn edit-btn-js"
                        data-id="${event.id}">
                    Edit
                </button>

            </div>

        </div>
    `).join("");
}

/* ---------------- EVENT DELEGATION ---------------- */

document.addEventListener("click", (e) => {

    // View uploads
    if (e.target.classList.contains("view-uploads-btn")) {
        const slug = e.target.dataset.slug;
        window.location.href = `uploadView.html?slug=${slug}`;
    }

    // Delete event
    if (e.target.classList.contains("delete-btn-js")) {
        const id = e.target.dataset.id;
        deleteEvent(id);
    }

    // Edit event
    if (e.target.classList.contains("edit-btn-js")) {
        const id = e.target.dataset.id;
        editEvent(id);
    }
});

/* ---------------- DELETE EVENT ---------------- */

async function deleteEvent(id) {

    if (!confirm("Delete this event?")) return;

    await fetch(`/api/events/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": `Bearer ${token}`,
            "Accept": "application/json"
        }
    });

    loadEvents();
}

/* ---------------- EDIT EVENT ---------------- */

async function editEvent(id) {

    try {

        const res = await fetch(`/api/events/${id}`, {
            headers: {
                "Authorization": `Bearer ${token}`,
                "Accept": "application/json"
            }
        });

        const event = await res.json();

        document.getElementById("editEventId").value = event.id;
        document.getElementById("editEventTitle").value = event.title;
        document.getElementById("editEventDescription").value = event.description ?? "";
        document.getElementById("editEventDateName").innerHTML = event.event_date;

        document.getElementById("editModal").style.display = "flex";

    } catch (err) {
        console.error("Failed to load event", err);
    }
}


/* ---------------- UPDATE EVENT ---------------- */

document.getElementById("editEventForm")
.addEventListener("submit", async function (e) {

    e.preventDefault();

    const id = document.getElementById("editEventId").value;

    const formData = {
        title: document.getElementById("editEventTitle").value,
        description: document.getElementById("editEventDescription").value,
        event_date: document.getElementById("editEventDate").value
    };

    try {

        const res = await fetch(`/api/events/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`,
                "Accept": "application/json"
            },
            body: JSON.stringify(formData)
        });

        const data = await res.json();

        alert(data.message ?? "Event updated");

        document.getElementById("editModal").style.display = "none";

        loadEvents();

    } catch (err) {
        console.error("Update failed", err);
    }
});

/* ---------------- LOGOUT ---------------- */

document.getElementById("logoutBtn").addEventListener("click", async () => {

    await fetch("/api/logout", {
        method: "POST",
        headers: {
            "Authorization": `Bearer ${token}`,
            "Accept": "application/json"
        }
    });

    localStorage.clear();
    window.location.href = "/html/auth/login.html";
});


/* ---------------- MODAL ---------------- */

const modal = document.getElementById("createModal");

document.getElementById("openCreateBtn").onclick = () => {
    modal.style.display = "flex";
};

document.getElementById("closeCreateBtn").onclick = () => {
    modal.style.display = "none";
};


document.getElementById("closeEditBtn").onclick = () => {
    document.getElementById("editModal").style.display = "none";
};

/* ---------------- CREATE EVENT ---------------- */

document.getElementById("createEventForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const formData = {
        title: this.title.value,
        description: this.description.value,
        event_date: this.event_date.value
    };

    const res = await fetch("/api/events", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`,
            "Accept": "application/json"
        },
        body: JSON.stringify(formData)
    });

    const data = await res.json();

    alert(data.message ?? "Event created");

    modal.style.display = "none";
    this.reset();
    loadEvents();
});


//Profile

document.addEventListener("DOMContentLoaded", () => {

    const profileBtn = document.getElementById("profileBtn");
    const profileModal = document.getElementById("profileModal");
    const closeProfileBtn = document.getElementById("closeProfileBtn");
    const profileForm = document.getElementById("profileForm");

    if (!profileBtn || !profileModal) {
        console.error("Profile elements missing in DOM");
        return;
    }

    // OPEN PROFILE
    profileBtn.addEventListener("click", async () => {

        profileModal.style.display = "flex";

        try {
            const res = await fetch("/api/organizers", {
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Accept": "application/json"
                }
            });

            const user = await res.json(); // FIXED (no [0])

            document.getElementById("profileId").value = user.id;
            document.getElementById("profileName").value = user.name;
            document.getElementById("profileEmail").value = user.email;
            document.getElementById("profilePassword").value = user.password;

        } catch (err) {
            console.error("Failed to load profile", err);
        }
    });

    // CLOSE PROFILE
    closeProfileBtn?.addEventListener("click", () => {
        profileModal.style.display = "none";
    });

    // UPDATE PROFILE
    profileForm?.addEventListener("submit", async (e) => {
        e.preventDefault();

        const id = document.getElementById("profileId").value;

        const formData = {
            name: document.getElementById("profileName").value,
            email: document.getElementById("profileEmail").value,
            password: document.getElementById("profilePassword").value
        };

        const res = await fetch(`/api/organizers/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`,
                "Accept": "application/json"
            },
            body: JSON.stringify(formData)
        });

        const data = await res.json();

        alert(data.message ?? "Profile updated");

        profileModal.style.display = "none";
    });


    // Delete Account
    document.getElementById("deleteAccountBtn").addEventListener("click", async () => {

    if (!confirm("Are you sure you want to delete your account? This action cannot be undone.")) {
        return;
    }

    await fetch("/api/organizers/{id}", {
        method: "DELETE",
        headers: {
            "Authorization": `Bearer ${token}`,
            "Accept": "application/json"
        }
    });

    localStorage.clear();
    window.location.href = "/html/auth/login.html";
});


});
</script>

</body>
</html>
